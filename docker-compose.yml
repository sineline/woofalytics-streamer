services:
  woofalytics:
    build: .
    privileged: true   # Required for full USB audio (PS Eye 4-ch) visibility inside container
    # GPU access via NVIDIA Container Toolkit
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # Match any USB audio device (PS Eye names vary between reboots)
      - MIC_DEVICE_HINT=USB
      # USB 4ch mic (PS Eye style)
      - MIC_CHANNELS=4
      - MIC_SAMPLE_RATE=16000
      # --- YouTube Live Stream ---
      - YOUTUBE_STREAM_KEY=
      # USB Camera — /dev/video3 (check with v4l2-ctl --list-devices)
      - VIDEO_DEVICE=/dev/video3

      # How long after the last bark before the OSD resets to "Monitoring"
      - BARK_QUIET_SECONDS=10
      # Auto-save cooldown in seconds (min time between saved clips)
      - AUTO_SAVE_COOLDOWN=30
    ports:
      - "8000:8000"
    devices:
      # ALSA sound devices (microphone access)
      - /dev/snd:/dev/snd
      # Video devices (privileged mode gives access to all, but list explicitly)
      - /dev/video0:/dev/video0
      - /dev/video1:/dev/video1
      - /dev/video2:/dev/video2
      - /dev/video3:/dev/video3
    group_add:
      - audio
    volumes:
      # Recorded WAV clips are persisted on the host under ./clips/
      - ./clips:/app/clips
    restart: unless-stopped
