<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Woofalytics — Clip Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07080f; --surface: #0f1120; --s2: #161828;
      --border: rgba(255,255,255,0.07); --amber: #f59e0b;
      --red: #ef4444; --green: #22c55e; --blue: #3b82f6;
      --text: #e2e8f0; --muted: #64748b; --r: 14px;
      --mono: 'JetBrains Mono', monospace;
    }
    body { font-family:'Outfit',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:24px; }

    /* ── Top bar ── */
    .toolbar {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 20px; flex-wrap: wrap;
    }
    .toolbar h2 { font-size: 1.1rem; font-weight: 600; }
    .toolbar-right { margin-left: auto; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    select, input[type=text] {
      background: var(--s2); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); padding: 7px 12px; font-family:'Outfit'; font-size:.85rem;
      outline: none; min-width: 140px;
    }
    select:focus, input[type=text]:focus { border-color: var(--amber); }
    .btn {
      padding: 7px 16px; border-radius: 8px; border: none; font-family:'Outfit';
      font-size:.85rem; font-weight: 500; cursor: pointer; transition: all .2s;
    }
    .btn-amber  { background: var(--amber); color: #000; }
    .btn-amber:hover { opacity:.85; }
    .btn-ghost  { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--amber); border-color: var(--amber); }
    .btn-red    { background: rgba(239,68,68,.15); color: var(--red); border: 1px solid rgba(239,68,68,.3); }
    .btn-red:hover { background: rgba(239,68,68,.25); }

    /* ── Stats strip ── */
    .stats { display: flex; gap: 14px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-pill {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 99px; padding: 5px 16px; font-size:.82rem; color: var(--muted);
    }
    .stat-pill strong { color: var(--text); }

    /* ── Dogs sidebar + main area ── */
    .layout { display: grid; grid-template-columns: 220px 1fr; gap: 18px; align-items: start; }
    @media(max-width:780px){ .layout { grid-template-columns: 1fr; } }

    /* ── Dog list sidebar ── */
    .dogs-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; }
    .dogs-panel-title { font-size:.72rem; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }
    .dog-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: 10px; cursor: pointer;
      transition: background .15s; margin-bottom: 4px;
    }
    .dog-item:hover { background: var(--s2); }
    .dog-item.active { background: rgba(245,158,11,.1); }
    .dog-swatch { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .dog-info { flex: 1; min-width: 0; }
    .dog-name { font-size:.87rem; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .dog-count { font-size:.72rem; color: var(--muted); }
    .dog-edit-btn {
      opacity: 0; background: none; border: none; color: var(--muted);
      cursor: pointer; font-size:.85rem; padding: 2px 5px; border-radius: 4px;
      transition: opacity .15s, color .15s;
    }
    .dog-item:hover .dog-edit-btn { opacity: 1; }
    .dog-edit-btn:hover { color: var(--amber); }
    .add-dog-btn {
      width: 100%; margin-top: 8px; padding: 7px; border-radius: 8px;
      background: var(--s2); border: 1px dashed rgba(255,255,255,.12);
      color: var(--muted); font-family:'Outfit'; font-size:.82rem; cursor: pointer;
      transition: all .2s;
    }
    .add-dog-btn:hover { color: var(--amber); border-color: rgba(245,158,11,.4); }

    /* ── Clips grid ── */
    .clips-area { min-height: 300px; }
    .clips-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap;
    }
    .clips-header h3 { font-size:.95rem; font-weight:600; }
    .clip-count { font-size:.78rem; color: var(--muted); }
    .bulk-bar { display: none; gap: 8px; align-items: center; margin-left: auto; }
    .bulk-bar.visible { display: flex; }
    .selected-count { font-size:.8rem; color: var(--muted); }

    .clips-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 14px; }

    .clip-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px;
      transition: border-color .2s;
      position: relative;
    }
    .clip-card:hover { border-color: rgba(255,255,255,.14); }
    .clip-card.selected { border-color: var(--amber); background: rgba(245,158,11,.04); }

    .clip-select {
      position: absolute; top: 12px; right: 12px;
      width: 17px; height: 17px; cursor: pointer; accent-color: var(--amber);
    }

    .clip-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
    .clip-time { font-size:.78rem; color: var(--muted); font-family: var(--mono); }
    .dog-badge {
      font-size:.72rem; font-weight:600; padding: 2px 9px; border-radius: 99px;
      cursor: default;
    }
    .clip-stats { display: flex; gap: 12px; margin-bottom: 10px; }
    .clip-stat { font-size:.78rem; color: var(--muted); }
    .clip-stat strong { color: var(--text); font-weight:500; }

    /* ── Waveform player ── */
    .waveform-wrap {
      position:relative; height:64px; margin-bottom:8px; cursor:pointer;
      border-radius:6px; overflow:hidden; background:rgba(0,0,0,.2);
    }
    .waveform-wrap canvas { display:block; width:100%; height:100%; }

    .player-controls {
      display:flex; align-items:center; gap:8px; margin-bottom: 10px; flex-wrap:wrap;
    }
    .play-btn {
      width:30px; height:30px; border-radius:50%;
      background:var(--amber); border:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:transform .1s; flex-shrink:0;
    }
    .play-btn:hover { transform:scale(1.08); }
    .play-btn svg { width:14px; height:14px; fill:#000; }
    .time-display {
      font-size:.72rem; font-family:var(--mono); color:var(--muted);
      min-width:85px;
    }
    .speed-btn {
      padding:2px 8px; border-radius:5px; font-size:.68rem; font-weight:600;
      background:var(--s2); border:1px solid var(--border); color:var(--muted);
      cursor:pointer; font-family:var(--mono); transition:all .15s;
    }
    .speed-btn.active { background:rgba(245,158,11,.15); border-color:var(--amber); color:var(--amber); }
    .skip-btn {
      padding:2px 6px; border-radius:5px; font-size:.68rem;
      background:transparent; border:1px solid var(--border); color:var(--muted);
      cursor:pointer; transition:all .15s;
    }
    .skip-btn:hover { color:var(--text); border-color:rgba(255,255,255,.2); }

    .clip-actions { display: flex; gap: 8px; }
    .tag-select {
      flex: 1; background: var(--s2); border: 1px solid var(--border); border-radius: 7px;
      color: var(--text); padding: 5px 8px; font-family:'Outfit'; font-size:.78rem;
      outline: none; cursor: pointer;
    }
    .tag-select:focus { border-color: var(--amber); }
    .clip-del-btn {
      background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.2);
      color: var(--red); border-radius: 7px; padding: 5px 10px;
      font-size:.8rem; cursor: pointer; font-family:'Outfit'; transition: all .2s;
    }
    .clip-del-btn:hover { background: rgba(239,68,68,.25); }

    .lib-lbl-btn {
      padding:4px 10px; border-radius:6px; font-size:.7rem; font-weight:600;
      border:1px solid var(--border); background:transparent; color:var(--muted);
      cursor:pointer; transition:all .15s; font-family:'Outfit';
    }
    .lib-lbl-btn:hover { border-color:rgba(255,255,255,.2); color:var(--text); }
    .lib-lbl-active-bark { background:rgba(34,197,94,.2); border-color:var(--green); color:var(--green); }
    .lib-lbl-active-not  { background:rgba(239,68,68,.2); border-color:var(--red); color:var(--red); }

    .no-clip-msg { color:var(--muted); font-size:.78rem; margin-bottom:10px; }

    /* ── Empty / loading ── */
    .empty { color: var(--muted); text-align: center; padding: 48px; font-size:.9rem; }

    /* ── Inline rename input ── */
    .rename-input {
      background: var(--s2); border: 1px solid var(--amber); border-radius: 6px;
      color: var(--text); font-family:'Outfit'; font-size:.84rem;
      padding: 3px 8px; width: 100%; outline: none;
    }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 20px; font-size:.85rem;
      opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 9998;
    }
    #toast.show { opacity: 1; }

    /* ── Pagination ── */
    .pagination {
      display:flex; align-items:center; justify-content:center; gap:8px;
      padding:14px 0; margin-top:4px;
    }
    .page-btn {
      background:var(--s2); border:1px solid var(--border); border-radius:8px;
      color:var(--text); padding:6px 14px; font-family:'Outfit'; font-size:.82rem;
      cursor:pointer; transition:all .15s; font-weight:500;
    }
    .page-btn:hover { border-color:var(--amber); color:var(--amber); }
    .page-btn:disabled { opacity:.3; cursor:not-allowed; border-color:var(--border); color:var(--muted); }
    .page-btn.active { background:rgba(245,158,11,.15); border-color:var(--amber); color:var(--amber); font-weight:700; }
    .page-info {
      font-size:.78rem; color:var(--muted); font-family:var(--mono);
      padding:0 8px;
    }
    .page-size-select {
      background:var(--s2); border:1px solid var(--border); border-radius:6px;
      color:var(--muted); padding:4px 8px; font-size:.75rem; font-family:var(--mono);
      outline:none; cursor:pointer; margin-left:8px;
    }
  </style>
</head>
<body>

<script src="/nav.js"></script>

<div class="toolbar">
  <h2>📼 Clip Library</h2>
  <div class="toolbar-right">
    <input type="text" id="search-input" placeholder="Search clips…" oninput="currentPage=0;applyFilters()">
    <select id="sort-select" onchange="currentPage=0;applyFilters()">
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
      <option value="loudest">Loudest</option>
      <option value="longest">Longest</option>
    </select>
    <button class="btn btn-ghost" onclick="loadAll()">↻ Refresh</button>
  </div>
</div>

<!-- Processing toolbar -->
<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px">
  <input type="file" id="import-input" multiple accept=".mp3,.wav,.flac,.ogg,.m4a" style="display:none" onchange="importFiles(this.files)">
  <button class="btn btn-ghost" onclick="document.getElementById('import-input').click()" style="color:var(--amber);border-color:var(--amber)">
    📂 Import Audio
  </button>
  <button class="btn btn-ghost" id="slice-all-btn" onclick="sliceAll()" style="color:#22c55e;border-color:#22c55e">
    ✂️ Smart-Slice All
  </button>
  <button class="btn btn-ghost" id="denoise-btn" onclick="denoiseAll()" style="color:#60a5fa;border-color:#60a5fa">
    🔇 Denoise All
  </button>
  <button class="btn btn-ghost" id="speech-btn" onclick="filterSpeech()" style="color:#ef4444;border-color:#ef4444">
    🗣️ Remove Speech
  </button>
  <button class="btn btn-ghost" id="silence-btn" onclick="cleanSilence()" style="color:#a855f7;border-color:#a855f7">
    🔕 Clean Silence
  </button>
  <div id="process-status" style="flex:1;font-size:.78rem;color:var(--muted);display:flex;align-items:center;justify-content:flex-end;min-width:120px"></div>
</div>

<div class="stats" id="stats-strip"></div>

<div class="layout">

  <!-- Dogs sidebar -->
  <div class="dogs-panel">
    <div class="dogs-panel-title">Dogs</div>
    <div id="dog-list"></div>
    <button class="add-dog-btn" onclick="addDog()">＋ Add dog</button>
  </div>

  <!-- Clips area -->
  <div class="clips-area">
    <div class="clips-header">
      <h3 id="clips-title">All Clips</h3>
      <span class="clip-count" id="clip-count"></span>
      <div class="bulk-bar" id="bulk-bar">
        <span class="selected-count" id="selected-count"></span>
        <button class="btn btn-red" onclick="bulkDelete()">Delete selected</button>
        <button class="btn btn-ghost" onclick="clearSelection()">Cancel</button>
      </div>
    </div>
    <div class="clips-grid" id="clips-grid">
      <div class="empty">Loading clips…</div>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>

</div>

<div id="toast"></div>

<script>
const PALETTE = ['#f59e0b','#3b82f6','#22c55e','#ec4899','#a855f7','#ef4444','#14b8a6','#f97316'];
let allEvents  = [];
let allDogs    = [];
let activeDog  = null;  // null = show all
let selected   = new Set();
let currentPage = 0;
let pageSize = 20;

// ── Processing helpers ───────────────────────────────────────────────────────
function setStatus(msg) { document.getElementById('process-status').textContent = msg; }

async function batchAction(url, body, btnId, label, confirmMsg) {
  if (confirmMsg && !confirm(confirmMsg)) return;
  const btn = document.getElementById(btnId);
  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = '⏳ Working…';
  setStatus('Processing…');
  try {
    const r = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body || {}),
    });
    const data = await r.json();
    const msg = typeof label === 'function' ? label(data) : JSON.stringify(data);
    toast(msg);
    setStatus('');
    await loadAll();
  } catch (e) {
    toast('Failed: ' + e.message);
    setStatus('');
  } finally {
    btn.disabled = false;
    btn.textContent = orig;
  }
}

function sliceAll() {
  const longClips = allEvents.filter(e => (e.duration || 0) > 9);
  batchAction('/api/clips/slice-all', {}, 'slice-all-btn',
    d => `✂️ Sliced ${d.processed} clips → ${d.total_segments} segments`,
    longClips.length
      ? `Smart-slice ${longClips.length} clip(s) longer than 9s?\nSilences removed, sound regions extracted.`
      : null
  );
  if (!longClips.length) toast('No long clips to slice');
}

function denoiseAll() {
  batchAction('/api/clips/denoise-all', {}, 'denoise-btn',
    d => `🔇 Denoised ${d.processed} clips (${d.nr_db} dB)`,
    `Apply FFT noise reduction to all clips?\nThis removes background hiss and hum.`
  );
}

function filterSpeech() {
  batchAction('/api/clips/filter-speech', {}, 'speech-btn',
    d => `🗣️ Checked ${d.checked} clips — deleted ${d.deleted} with speech`,
    `Run speech detection on all clips?\nClips with human voices above the threshold will be PERMANENTLY deleted.`
  );
}

function cleanSilence() {
  batchAction('/api/clips/clean-silence', {}, 'silence-btn',
    d => `🔕 Checked ${d.checked} clips — deleted ${d.deleted} silent clips`,
    `Remove all clips that are pure silence?\nEmpty recordings will be permanently deleted.`
  );
}

async function importFiles(fileList) {
  if (!fileList || !fileList.length) return;
  setStatus(`Uploading ${fileList.length} file(s)…`);
  const form = new FormData();
  for (const f of fileList) form.append('files', f);
  try {
    const r = await fetch('/api/clips/import', { method: 'POST', body: form });
    const data = await r.json();
    toast(`📂 Imported ${data.imported} file(s)`);
    setStatus('');
    document.getElementById('import-input').value = '';
    await loadAll();
  } catch (e) {
    toast('Import failed: ' + e.message);
    setStatus('');
  }
}

// ── Waveform player state ────────────────────────────────────────────────────
const players = {};         // id → { audio, animFrame, peaks }
const waveformCache = {};   // id → Float32Array

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, ms=2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), ms);
}

// ── Dog color ─────────────────────────────────────────────────────────────────
function dogColor(dogId) {
  const i = allDogs.findIndex(d => d.dog_id === dogId);
  return PALETTE[(i >= 0 ? i : 0) % PALETTE.length];
}

// ── Load data ─────────────────────────────────────────────────────────────────
async function loadAll() {
  // Pause all playing audio before reload
  Object.values(players).forEach(p => { if (p.audio) p.audio.pause(); });

  const [dogsR, eventsR] = await Promise.all([
    fetch('/api/dogs').then(r => r.json()),
    fetch('/api/events?limit=99999').then(r => r.json()),
  ]);
  allDogs   = dogsR;
  allEvents = eventsR;
  renderDogs();
  applyFilters();
  updateStats();
}

// ── Stats strip ───────────────────────────────────────────────────────────────
function updateStats() {
  const totalSize = allEvents.length;
  const totalDur  = allEvents.reduce((s, e) => s + (e.duration || 0), 0);
  const withClips = allEvents.filter(e => e.clip_path).length;
  document.getElementById('stats-strip').innerHTML = `
    <div class="stat-pill">Events: <strong>${totalSize}</strong></div>
    <div class="stat-pill">With clips: <strong>${withClips}</strong></div>
    <div class="stat-pill">Total audio: <strong>${totalDur.toFixed(0)} s</strong></div>
    <div class="stat-pill">Dogs: <strong>${allDogs.length}</strong></div>
  `;
}

// ── Dogs sidebar ──────────────────────────────────────────────────────────────
function renderDogs() {
  const list = document.getElementById('dog-list');
  const counts = {};
  allEvents.forEach(e => { counts[e.dog_id] = (counts[e.dog_id] || 0) + 1; });

  const allItem = `
    <div class="dog-item ${activeDog === null ? 'active' : ''}" onclick="selectDog(null)">
      <div class="dog-swatch" style="background:var(--muted)"></div>
      <div class="dog-info">
        <div class="dog-name">All Dogs</div>
        <div class="dog-count">${allEvents.length} clips</div>
      </div>
    </div>`;

  const dogItems = allDogs.map((d, i) => {
    const color = PALETTE[i % PALETTE.length];
    const cnt = counts[d.dog_id] || 0;
    return `
      <div class="dog-item ${activeDog === d.dog_id ? 'active' : ''}" onclick="selectDog('${d.dog_id}')">
        <div class="dog-swatch" style="background:${color}"></div>
        <div class="dog-info">
          <div class="dog-name" id="dog-name-${d.dog_id}">${d.name}</div>
          <div class="dog-count">${cnt} clips</div>
        </div>
        <button class="dog-edit-btn" onclick="event.stopPropagation();startRename('${d.dog_id}')" title="Rename">✏️</button>
      </div>`;
  }).join('');

  list.innerHTML = allItem + dogItems;
}

function selectDog(dogId) {
  activeDog = dogId;
  currentPage = 0;  // reset pagination
  renderDogs();
  applyFilters();
  document.getElementById('clips-title').textContent =
    dogId ? (allDogs.find(d => d.dog_id === dogId)?.name || dogId) + ' — Clips' : 'All Clips';
}

// ── Rename dog inline ─────────────────────────────────────────────────────────
function startRename(dogId) {
  const el = document.getElementById('dog-name-' + dogId);
  const old = el.textContent;
  el.innerHTML = `<input class="rename-input" id="ri-${dogId}" value="${old}">`;
  const inp = document.getElementById('ri-' + dogId);
  inp.focus(); inp.select();
  inp.addEventListener('keydown', async e => {
    if (e.key === 'Enter') await commitRename(dogId, inp.value);
    if (e.key === 'Escape') { el.textContent = old; }
  });
  inp.addEventListener('blur', () => { if (el.querySelector('input')) el.textContent = old; });
}

async function commitRename(dogId, newName) {
  newName = newName.trim();
  if (!newName) return;
  await fetch(`/api/dogs/${encodeURIComponent(dogId)}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: newName }),
  });
  // Update local
  const d = allDogs.find(d => d.dog_id === dogId);
  if (d) d.name = newName;
  renderDogs();
  applyFilters();
  toast(`Renamed to "${newName}"`);
}

async function addDog() {
  const name = prompt('New dog name (leave blank for auto):')?.trim();
  const r = await fetch('/api/dogs', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: name || null }),
  });
  const { dog_id } = await r.json();
  await loadAll();
  toast(`Created "${dog_id}"`);
}

// ── Clip filtering ────────────────────────────────────────────────────────────
function applyFilters() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const sort   = document.getElementById('sort-select').value;

  let events = activeDog ? allEvents.filter(e => e.dog_id === activeDog) : allEvents;
  if (search) events = events.filter(e =>
    (e.dog_id||'').toLowerCase().includes(search) ||
    (e.timestamp||'').includes(search)
  );

  events = [...events].sort((a, b) => {
    if (sort === 'newest')  return new Date(b.timestamp) - new Date(a.timestamp);
    if (sort === 'oldest')  return new Date(a.timestamp) - new Date(b.timestamp);
    if (sort === 'loudest') return (b.peak_dbfs||0) - (a.peak_dbfs||0);
    if (sort === 'longest') return (b.duration||0)  - (a.duration||0);
    return 0;
  });

  const totalPages = Math.max(1, Math.ceil(events.length / pageSize));
  if (currentPage >= totalPages) currentPage = totalPages - 1;
  if (currentPage < 0) currentPage = 0;
  const pageEvents = events.slice(currentPage * pageSize, (currentPage + 1) * pageSize);

  document.getElementById('clip-count').textContent = `${events.length} clip${events.length !== 1 ? 's' : ''}`;
  renderClips(pageEvents);
  renderLibPagination(events.length, totalPages);
}

// ── Clips grid ────────────────────────────────────────────────────────────────
function renderClips(events) {
  // Stop all active players
  Object.values(players).forEach(p => {
    if (p.audio) p.audio.pause();
    if (p.animFrame) cancelAnimationFrame(p.animFrame);
  });

  const grid = document.getElementById('clips-grid');
  if (!events.length) {
    grid.innerHTML = '<div class="empty">No clips found</div>';
    return;
  }
  grid.innerHTML = events.map(ev => buildClipCard(ev)).join('');

  // Initialize waveform players for visible clips
  events.forEach(ev => {
    if (ev.clip_path) initWaveformPlayer(ev);
  });
}

// ── Library pagination ────────────────────────────────────────────────────
function renderLibPagination(totalItems, totalPages) {
  const pg = document.getElementById('pagination');
  if (totalPages <= 1) {
    pg.innerHTML = totalItems ? `<span class="page-info">${totalItems} clips</span>` : '';
    return;
  }
  const start = currentPage * pageSize + 1;
  const end = Math.min((currentPage + 1) * pageSize, totalItems);
  let btns = '';
  btns += `<button class="page-btn" onclick="goLibPage(0)" ${currentPage===0?'disabled':''}>«</button>`;
  btns += `<button class="page-btn" onclick="goLibPage(${currentPage-1})" ${currentPage===0?'disabled':''}>‹</button>`;
  let pStart = Math.max(0, currentPage - 3);
  let pEnd = Math.min(totalPages - 1, pStart + 6);
  pStart = Math.max(0, pEnd - 6);
  for (let i = pStart; i <= pEnd; i++) {
    btns += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goLibPage(${i})">${i+1}</button>`;
  }
  btns += `<button class="page-btn" onclick="goLibPage(${currentPage+1})" ${currentPage>=totalPages-1?'disabled':''}>›</button>`;
  btns += `<button class="page-btn" onclick="goLibPage(${totalPages-1})" ${currentPage>=totalPages-1?'disabled':''}>»</button>`;
  btns += `<span class="page-info">${start}–${end} of ${totalItems}</span>`;
  btns += `<select class="page-size-select" onchange="setLibPageSize(+this.value)">
    <option value="12" ${pageSize===12?'selected':''}>12</option>
    <option value="20" ${pageSize===20?'selected':''}>20</option>
    <option value="40" ${pageSize===40?'selected':''}>40</option>
    <option value="80" ${pageSize===80?'selected':''}>80</option>
  </select>`;
  pg.innerHTML = btns;
}

function goLibPage(p) {
  currentPage = p;
  // Stop all audio
  Object.values(players).forEach(pl => {
    if (pl.audio) pl.audio.pause();
    if (pl.animFrame) cancelAnimationFrame(pl.animFrame);
  });
  applyFilters();
  document.getElementById('clips-grid').scrollIntoView({ behavior:'smooth', block:'start' });
}

function setLibPageSize(n) {
  pageSize = n;
  currentPage = 0;
  applyFilters();
}

function buildClipCard(ev) {
  const color   = dogColor(ev.dog_id);
  const dogName = allDogs.find(d => d.dog_id === ev.dog_id)?.name || ev.dog_id || 'Unknown';
  const clip    = ev.clip_path ? ev.clip_path.replace('./clips/', '') : null;
  const ts      = ev.timestamp ? new Date(ev.timestamp).toLocaleString() : '—';
  const dur     = ev.duration  ? ev.duration.toFixed(1) + ' s'    : '—';
  const peak    = ev.peak_dbfs != null ? ev.peak_dbfs.toFixed(1) + ' dBFS' : '—';
  const prob    = ev.bark_prob  != null ? (ev.bark_prob * 100).toFixed(0) + '%' : '—';
  const doa     = ev.doa        != null ? ev.doa.toFixed(0) + '°' : '—';
  const isSel   = selected.has(ev.id);
  const lbl     = ev.label;

  const dogOptions = allDogs.map(d =>
    `<option value="${d.dog_id}" ${d.dog_id === ev.dog_id ? 'selected' : ''}>${d.name}</option>`
  ).join('');

  const lblBorder = lbl === 1 ? 'border-color:rgba(34,197,94,.4)' : lbl === 0 ? 'border-color:rgba(239,68,68,.4)' : '';

  return `
    <div class="clip-card ${isSel ? 'selected' : ''}" id="card-${ev.id}" style="${lblBorder}">
      <input type="checkbox" class="clip-select" ${isSel ? 'checked' : ''}
             onchange="toggleSelect(${ev.id}, this.checked)">
      <div class="clip-meta">
        <span class="clip-time">${ts}</span>
        <span class="dog-badge" style="background:${color}22;color:${color}">${dogName}</span>
      </div>
      <div class="clip-stats">
        <div class="clip-stat">Prob <strong>${prob}</strong></div>
        <div class="clip-stat">Peak <strong>${peak}</strong></div>
        <div class="clip-stat">Dur <strong>${dur}</strong></div>
        <div class="clip-stat">DOA <strong>${doa}</strong></div>
      </div>
      ${clip ? `
        <div class="waveform-wrap" id="wave-wrap-${ev.id}">
          <canvas id="wave-${ev.id}"></canvas>
        </div>
        <div class="player-controls" id="controls-${ev.id}">
          <button class="play-btn" id="play-btn-${ev.id}" onclick="togglePlay(${ev.id})">
            <svg viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
          </button>
          <button class="skip-btn" onclick="skipTime(${ev.id},-5)">−5s</button>
          <button class="skip-btn" onclick="skipTime(${ev.id},5)">+5s</button>
          <span class="time-display" id="time-${ev.id}">0:00 / 0:00</span>
          <div style="margin-left:auto;display:flex;gap:3px">
            <button class="speed-btn active" onclick="setSpeed(${ev.id},1,this)">1×</button>
            <button class="speed-btn" onclick="setSpeed(${ev.id},1.5,this)">1.5×</button>
            <button class="speed-btn" onclick="setSpeed(${ev.id},2,this)">2×</button>
          </div>
        </div>
      ` : '<div class="no-clip-msg">No audio clip</div>'}
      <div class="clip-actions">
        <div style="display:flex;gap:4px">
          <button class="lib-lbl-btn ${lbl===1?'lib-lbl-active-bark':''}" onclick="event.stopPropagation();libSetLabel(${ev.id},1)" title="Label as bark">🐕 Bark</button>
          <button class="lib-lbl-btn ${lbl===0?'lib-lbl-active-not':''}" onclick="event.stopPropagation();libSetLabel(${ev.id},0)" title="Label as not bark">✗ Not</button>
        </div>
        <select class="tag-select" onchange="retagEvent(${ev.id}, this.value)">
          ${dogOptions}
        </select>
        <button class="clip-del-btn" onclick="deleteEvent(${ev.id}, '${clip || ''}')">🗑</button>
      </div>
    </div>`;
}

// ── Waveform Player ───────────────────────────────────────────────────────────
function initWaveformPlayer(ev) {
  const fn = (ev.clip_path || '').replace('./clips/', '');
  const canvas = document.getElementById('wave-' + ev.id);
  if (!canvas) return;

  const wrap = canvas.parentElement;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = wrap.clientWidth * dpr;
  canvas.height = wrap.clientHeight * dpr;

  // Create audio
  const audio = new Audio('/clips/' + fn);
  audio.preload = 'metadata';

  players[ev.id] = { audio, ctx, canvas, peaks: null, animFrame: null };

  // Click to seek
  wrap.addEventListener('click', (e) => {
    if (!audio.duration) return;
    const rect = wrap.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
    if (audio.paused) { audio.play(); updatePlayBtn(ev.id, true); }
  });

  audio.addEventListener('loadedmetadata', () => {
    updateTimeDisp(ev.id, audio);
    // Auto-seek near the bark event (center of clip)
    if (audio.duration > 10) {
      audio.currentTime = audio.duration / 2 - 2;
    }
  });

  audio.addEventListener('ended', () => updatePlayBtn(ev.id, false));

  // Decode waveform
  if (waveformCache[ev.id]) {
    players[ev.id].peaks = waveformCache[ev.id];
    drawWave(ev.id);
    startAnim(ev.id);
  } else {
    // Lazy-load waveform when card is scrolled into view
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          observer.disconnect();
          fetch('/clips/' + fn)
            .then(r => r.arrayBuffer())
            .then(buf => {
              const actx = new (window.AudioContext || window.webkitAudioContext)();
              return actx.decodeAudioData(buf);
            })
            .then(decoded => {
              const peaks = extractPeaks(decoded, canvas.width);
              waveformCache[ev.id] = peaks;
              if (players[ev.id]) {
                players[ev.id].peaks = peaks;
                drawWave(ev.id);
                startAnim(ev.id);
              }
            })
            .catch(() => {
              startAnim(ev.id); // fallback: just draw progress bar
            });
        }
      });
    }, { threshold: 0.1 });
    observer.observe(wrap);
  }
}

function extractPeaks(decoded, numBars) {
  const raw = decoded.getChannelData(0);
  const blockSize = Math.floor(raw.length / numBars);
  const peaks = new Float32Array(numBars);
  for (let i = 0; i < numBars; i++) {
    let max = 0;
    const start = i * blockSize;
    for (let j = 0; j < blockSize; j++) {
      const v = Math.abs(raw[start + j] || 0);
      if (v > max) max = v;
    }
    peaks[i] = max;
  }
  return peaks;
}

function drawWave(id) {
  const p = players[id];
  if (!p) return;
  const { ctx, canvas, peaks, audio } = p;
  const W = canvas.width, H = canvas.height;
  const dpr = window.devicePixelRatio || 1;
  ctx.clearRect(0, 0, W, H);

  const midY = H / 2;
  const dur = audio.duration || 1;
  const pos = audio.currentTime / dur;

  // Bark event center marker
  const centerX = W * 0.5;
  const markerW = W * 0.08;
  ctx.fillStyle = 'rgba(245,158,11,.06)';
  ctx.fillRect(centerX - markerW/2, 0, markerW, H);
  ctx.strokeStyle = 'rgba(245,158,11,.25)';
  ctx.lineWidth = 1 * dpr;
  ctx.setLineDash([3*dpr, 3*dpr]);
  ctx.beginPath(); ctx.moveTo(centerX, 0); ctx.lineTo(centerX, H); ctx.stroke();
  ctx.setLineDash([]);

  // Waveform
  if (peaks) {
    const barW = Math.max(1, W / peaks.length);
    for (let i = 0; i < peaks.length; i++) {
      const x = i * barW;
      const h = peaks[i] * midY * 0.85;
      const pct = i / peaks.length;
      ctx.fillStyle = pct < pos ? 'rgba(245,158,11,.65)' : 'rgba(226,232,240,.2)';
      ctx.fillRect(x, midY - h, Math.max(1, barW - 0.5*dpr), h * 2);
    }
  }

  // Playhead
  const playX = pos * W;
  ctx.strokeStyle = '#f59e0b';
  ctx.lineWidth = 2 * dpr;
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(playX, 0); ctx.lineTo(playX, H); ctx.stroke();
  ctx.fillStyle = '#f59e0b';
  ctx.beginPath(); ctx.arc(playX, midY, 3*dpr, 0, Math.PI*2); ctx.fill();
}

function startAnim(id) {
  const p = players[id];
  if (!p) return;
  if (p.animFrame) cancelAnimationFrame(p.animFrame);

  function frame() {
    if (!players[id]) return;
    drawWave(id);
    updateTimeDisp(id, p.audio);
    p.animFrame = requestAnimationFrame(frame);
  }
  p.animFrame = requestAnimationFrame(frame);
}

function togglePlay(id) {
  const p = players[id];
  if (!p) return;
  // Pause all others
  Object.entries(players).forEach(([k, v]) => {
    if (parseInt(k) !== id && v.audio && !v.audio.paused) {
      v.audio.pause();
      updatePlayBtn(parseInt(k), false);
    }
  });
  if (p.audio.paused) {
    p.audio.play();
    updatePlayBtn(id, true);
  } else {
    p.audio.pause();
    updatePlayBtn(id, false);
  }
}

function updatePlayBtn(id, playing) {
  const btn = document.getElementById('play-btn-' + id);
  if (!btn) return;
  btn.innerHTML = playing
    ? '<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>'
    : '<svg viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>';
}

function skipTime(id, delta) {
  const p = players[id];
  if (!p) return;
  p.audio.currentTime = Math.max(0, Math.min(p.audio.duration || 0, p.audio.currentTime + delta));
}

function setSpeed(id, rate, btn) {
  const p = players[id];
  if (!p) return;
  p.audio.playbackRate = rate;
  // Update button group
  const parent = btn.parentElement;
  parent.querySelectorAll('.speed-btn').forEach(b => {
    b.classList.toggle('active', parseFloat(b.textContent) === rate);
  });
}

function updateTimeDisp(id, audio) {
  const el = document.getElementById('time-' + id);
  if (!el) return;
  el.textContent = `${fmtTime(audio.currentTime)} / ${fmtTime(audio.duration || 0)}`;
}

function fmtTime(s) {
  if (!s || !isFinite(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + sec.toString().padStart(2, '0');
}

// ── Selection ────────────────────────────────────────────────────────────────
function toggleSelect(id, checked) {
  checked ? selected.add(id) : selected.delete(id);
  const card = document.getElementById('card-' + id);
  if (card) card.classList.toggle('selected', checked);
  const bar = document.getElementById('bulk-bar');
  bar.classList.toggle('visible', selected.size > 0);
  document.getElementById('selected-count').textContent = `${selected.size} selected`;
}

function clearSelection() {
  selected.forEach(id => {
    const card = document.getElementById('card-' + id);
    if (card) { card.classList.remove('selected'); card.querySelector('.clip-select').checked = false; }
  });
  selected.clear();
  document.getElementById('bulk-bar').classList.remove('visible');
}

// ── Labeling ──────────────────────────────────────────────────────────────────
async function libSetLabel(id, label) {
  await fetch(`/api/events/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ label }),
  });
  const ev = allEvents.find(e => e.id === id);
  if (ev) ev.label = label;
  applyFilters();
  toast(label === 1 ? '🐕 Labeled as Bark' : '✗ Labeled as Not Bark');
}

// ── CRUD actions ──────────────────────────────────────────────────────────────
async function retagEvent(eventId, dogId) {
  await fetch(`/api/events/${eventId}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ dog_id: dogId }),
  });
  const ev = allEvents.find(e => e.id === eventId);
  if (ev) ev.dog_id = dogId;
  renderDogs();
  toast('Clip reassigned');
}

async function deleteEvent(eventId) {
  if (!confirm('Delete this clip and its recording?')) return;
  // Cleanup player
  if (players[eventId]) {
    players[eventId].audio?.pause();
    if (players[eventId].animFrame) cancelAnimationFrame(players[eventId].animFrame);
    delete players[eventId];
  }
  await fetch(`/api/events/${eventId}`, { method: 'DELETE' });
  allEvents = allEvents.filter(e => e.id !== eventId);
  selected.delete(eventId);
  applyFilters();
  updateStats();
  renderDogs();
  toast('Clip deleted');
}

async function bulkDelete() {
  const ids = [...selected];
  if (!ids.length) return;
  if (!confirm(`Delete ${ids.length} clip(s)?`)) return;
  ids.forEach(id => {
    if (players[id]) { players[id].audio?.pause(); delete players[id]; }
  });
  await Promise.all(ids.map(id => fetch(`/api/events/${id}`, { method: 'DELETE' })));
  allEvents = allEvents.filter(e => !selected.has(e.id));
  selected.clear();
  document.getElementById('bulk-bar').classList.remove('visible');
  applyFilters();
  updateStats();
  renderDogs();
  toast(`${ids.length} clips deleted`);
}

loadAll();
</script>
